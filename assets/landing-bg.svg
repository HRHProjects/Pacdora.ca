<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Abstract blue and red hexagonal network background">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="0.25">
      <stop offset="0%" stop-color="#001044"/>
      <stop offset="58%" stop-color="#001139"/>
      <stop offset="100%" stop-color="#140220"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="1" cy="0.78" r="0.58">
      <stop offset="0%" stop-color="#ff2859" stop-opacity="0.85"/>
      <stop offset="38%" stop-color="#ca153f" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0a1434" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="0.9" cy="0.24" r="0.42">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0a1434" stop-opacity="0"/>
    </radialGradient>

    <pattern id="hexGrid" width="160" height="138.56" patternUnits="userSpaceOnUse" patternTransform="translate(1220 32)">
      <g fill="none" stroke="#f2f7ff" stroke-width="6" stroke-opacity="0.42" stroke-linecap="round" stroke-linejoin="round">
        <path d="M40 0h80l40 69.28-40 69.28H40L0 69.28z"/>
        <path d="M120 69.28h80l40 69.28-40 69.28h-80l-40-69.28z" transform="translate(-80 -69.28)"/>
      </g>
      <g fill="#f8fbff" fill-opacity="0.38">
        <circle cx="40" cy="0" r="9"/><circle cx="120" cy="0" r="9"/>
        <circle cx="0" cy="69.28" r="9"/><circle cx="40" cy="138.56" r="9"/>
        <circle cx="120" cy="138.56" r="9"/><circle cx="160" cy="69.28" r="9"/>
      </g>
    </pattern>

    <mask id="gridMask">
      <linearGradient id="gridFade" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="white" stop-opacity="0"/>
        <stop offset="30%" stop-color="white" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="white" stop-opacity="1"/>
      </linearGradient>
      <rect x="0" y="0" width="1920" height="1080" fill="url(#gridFade)"/>
    </mask>
  </defs>

  <rect width="1920" height="1080" fill="url(#base)"/>
  <rect width="1920" height="1080" fill="url(#blueGlow)"/>
  <rect width="1920" height="1080" fill="url(#redGlow)"/>
  <rect x="930" y="-20" width="1050" height="1160" fill="url(#hexGrid)" mask="url(#gridMask)" opacity="0.82"/>
  <rect x="0" y="0" width="1920" height="1080" fill="#02081f" opacity="0.26"/>
</svg>
